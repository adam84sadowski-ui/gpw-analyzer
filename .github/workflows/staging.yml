name: Deploy Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (staging)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | grep -oE 'https://[a-zA-Z0-9-]+\.vercel\.app' | head -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Re-point staging alias
        run: |
          for i in 1 2 3 4 5; do
            vercel alias set "${{ steps.deploy.outputs.url }}" gpw-analyzer-staging.vercel.app --token=${{ secrets.VERCEL_TOKEN }} && break
            echo "Deployment not ready yet, retrying in 15s ($i/5)..."
            sleep 15
          done
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Notify Telegram (staging)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN_STAGING }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID_STAGING }}" \
            -d "text=🟣 STAGING deploy zakończony pomyślnie ✅%0AURL: https://gpw-analyzer-staging.vercel.app%0AKommit: ${{ github.sha }}"

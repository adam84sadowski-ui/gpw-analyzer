name: Weekly Learning Agent

on:
  schedule:
    - cron: '0 18 * * 0'   # Sunday 18:00 UTC
  workflow_dispatch:

env:
  API_BASE: https://gpw-analyzer.vercel.app

jobs:
  learning:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run Learning Agent
        run: |
          curl -sf --max-time 120 --retry 1 --retry-delay 15 \
            "$API_BASE/api/cron/learning-weekly" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
